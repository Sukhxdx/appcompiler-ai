# Deploy on Render: https://render.com → New → Blueprint → connect this repo
services:
  - type: web
    name: appcompiler-ai
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: "3.11.9"
